<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка счёт-фактуры</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        input, button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #45a049; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            display: none;
        }
        .matched    { border-left: 5px solid #4CAF50; }
        .not_matched { border-left: 5px solid #f44336; }
        .partial_match { border-left: 5px solid #ff9800; }
        .not_found  { border-left: 5px solid #9e9e9e; }
        .error      { border-left: 5px solid #9c27b0; }
        .field { margin: 8px 0; }
        .label { font-weight: bold; color: #555; }
        .ok   { color: #4CAF50; }
        .fail { color: #f44336; }
    </style>
</head>
<body>
<h1>🧾 Проверка счёт-фактуры</h1>

<input type="file" id="fileInput" accept=".pdf" multiple>
<input type="text" id="number" placeholder="Ожидаемый номер (например 1349/1277)">
<input type="text" id="date"   placeholder="Ожидаемая дата (например 23.07.2025)">
<button onclick="checkInvoice()">Проверить</button>
<!--<button onclick="checkAndHighlight()" style="background:#2196F3;">🔍 Проверить + подсветить PDF</button>-->

<div id="result"></div>

<script>
    async function checkInvoice() {
        const files = document.getElementById('fileInput').files;
        const number = document.getElementById('number').value;
        const date = document.getElementById('date').value;

        if (!files.length || !number || !date) {
            alert('Заполните все поля!');
            return;
        }

        const formData = new FormData();
        if (files.length === 1) {
            formData.append('file', files[0]);
        } else {
            for (const file of files) {
                formData.append('files', file);
            }
        }

        formData.append('expected_number', number);
        formData.append('expected_date', date);

        const url = files.length > 1
            ? 'http://127.0.0.1:8000/check-batch'
            : 'http://127.0.0.1:8000/check';

        const response = await fetch(url, {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        const results = data.results ?? [data];
        showResults(results);
    }

    async function checkAndHighlight() {
        const files = document.getElementById('fileInput').files;
        const number = document.getElementById('number').value;
        const date = document.getElementById('date').value;

        if (!files.length || !number || !date) {
            alert('Заполните все поля!');
            return;
        }

        const formData = new FormData();
        formData.append('file', files[0]);
        formData.append('expected_number', number);
        formData.append('expected_date', date);

        const response = await fetch('http://127.0.0.1:8000/check-and-highlight', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'highlighted_invoice.pdf';
            a.click();

            URL.revokeObjectURL(url);

            const div = document.getElementById('result');
            div.style.display = 'block';
            div.innerHTML = '<p style="color:green; padding:10px;">✅ PDF скачан — номер и дата подсвечены!</p>';
        } else {
            alert('Ошибка при обработке файла');
        }
    }

    function showResults(results) {
        const div = document.getElementById('result');
        div.style.display = 'block';
        div.className = '';

        const statusLabels = {
            matched:       '✅ Совпадает',
            partial_match: '⚠️ Частичное совпадение',
            not_matched:   '❌ Не совпадает',
            not_found:     '🔍 Не найдено',
            error:         '💥 Ошибка'
        };

        div.innerHTML = results.map(data => `
        <div class="${data.status}" style="margin-bottom:16px; padding:16px; background:white; border-radius:8px;">
            <h3>${statusLabels[data.status]}</h3>
            <div class="field"><span class="label">Файл:</span> ${data.file_name}</div>
            <div class="field">
                <span class="label">Номер:</span>
                ожидался <b>${data.expected_number}</b>,
                найден <b>${data.found_number}</b>
                <span class="${data.number_match ? 'ok' : 'fail'}">${data.number_match ? '✓' : '✗'}</span>
            </div>
            <div class="field">
                <span class="label">Дата:</span>
                ожидалась <b>${data.expected_date}</b>,
                найдена <b>${data.found_date}</b>
                <span class="${data.date_match ? 'ok' : 'fail'}">${data.date_match ? '✓' : '✗'}</span>
            </div>
        </div>
    `).join('');
    }
</script>
</body>
</html>
